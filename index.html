<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Digital Onboarding Portal</title>

    <!-- Include Bootstrap 5 CSS via CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="app2.js" defer></script>

    <style>
        body {
            background: linear-gradient(135deg, #80a1c1, #eee3ab);
        }
    </style>

</head>
<body class="bg-light py-5">

<div class="container" style="max-width: 570px;">
  
    <!-- Simple Error Display Box -->
    <div id="errorAlert" class="alert alert-danger d-none py-2 mb-3 shadow-sm font-monospace fs-7"></div>

    <div class="card shadow-sm border-0">
        <div class="card-header bg-dark text-white text-center py-3">
            <h2 class="h5 mb-0">Employee Registration Portal</h2>
        </div>
        <div class="card-body p-4">

            <!-- ================= PHASE 1 ================= -->
            <div id="phaseOne">
                <h3 class="h6 mb-3 fw-bold text-primary text-uppercase tracking-wide">Phase 1 Elements (Legal Name and Information Fields)</h3>
                
                <div class="mb-2">
                    <label for="firstName" class="form-label small fw-bold text-secondary mb-1">First Name </label>
                    <input type="text" id="firstName" class="form-control" placeholder="Denver Jade">
                </div>
                
                <div class="mb-2">
                    <label for="middleName" class="form-label small fw-bold text-secondary mb-1">Middle Name</label>
                    <input type="text" id="middleName" class="form-control" placeholder="Dulcer">
                </div>
                
                <div class="mb-2">
                    <label for="lastName" class="form-label small fw-bold text-secondary mb-1">Last Name</label>
                    <input type="text" id="lastName" class="form-control" placeholder="Velasquez">
                </div>
                
                <div class="mb-3">
                    <label for="extName" class="form-label small fw-bold text-secondary mb-1">Extension Name</label>
                    <input type="text" id="extName" class="form-control" placeholder="Jr. II. III. (Optional)">
                </div>

                <div class="row g-2 mb-4">
                    <div class="col-4">
                        <label for="userAge" class="form-label small fw-bold text-secondary mb-1">Age</label>
                        <input type="number" id="userAge" class="form-control" placeholder="Age"  min="18" max="100">
                    </div>
                    <div class="col-8">
                        <label for="userGender" class="form-label small fw-bold text-secondary mb-1">Gender</label>
                        <select id="userGender" class="form-select">
                            <option value="" selected disabled>Select</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                        </select>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="userBirthday" class="form-label small fw-bold text-secondary mb-1">Birthday</label>
                    <input type="date" id="userBirthday" class="form-control">
                </div>
                
                <button type="button" id="btnGoToTwo" class="btn btn-primary w-100 fw-bold shadow-sm">Continue to Address</button>
            </div>

            <!-- ================= PHASE 2 ================= -->
            <div id="phaseTwo" class="d-none">
                <h3 class="h6 mb-3 fw-bold text-primary text-uppercase tracking-wide">Phase 2 Elements (Residential Address Fields)</h3>
                
                <div class="mb-3">
                    <label for="currentAddress" class="form-label small fw-bold text-secondary mb-1">Current Residential Address</label>
                    <textarea id="currentAddress" class="form-control" rows="2" placeholder="Street, Barangay, City"></textarea>
                </div>
                
                <div class="mb-4">
                    <label for="permanentAddress" class="form-label small fw-bold text-secondary mb-1">Permanent Residential Address</label>
                    <textarea id="permanentAddress" class="form-control" rows="2" placeholder="Street, Barangay, City"></textarea>
                </div>
                
                <button type="button" id="btnGoToThree" class="btn btn-success w-100 fw-bold shadow-sm">Finalize Profile Parameters</button>
            </div>

            <!-- ================= PHASE 3 ================= -->
            <div id="phaseThree" class="d-none">
                <h3 class="h6 mb-3 fw-bold text-success text-uppercase tracking-wide">Phase 3 Elements (HR Profile Data Summary)</h3>
                
                <div class="bg-light p-3 border rounded mb-4 font-monospace small">
                    <div class="mb-3">
                        <span class="d-block text-muted fw-bold border-bottom pb-1 mb-1">PROCESSED LEGAL Information:</span>
                        <div id="previewName" class="fw-bold text-dark fs-6">--</div>
                        <div id="previewAge" class="fw-bold text-dark fs-6">--</div>
                        <div id="previewGender" class="fw-bold text-dark fs-6">--</div>
                        <div id="previewBirthDate" class="fw-bold text-dark fs-6">--</div>
                    </div>
                    
                    <div class="mb-3">
                        <span class="d-block text-muted fw-bold border-bottom pb-1 mb-1">CURRENT RESIDENCE:</span>
                        <div id="previewCurrent" class="text-dark text-wrap">--</div>
                    </div>
                    
                    <div>
                        <span class="d-block text-muted fw-bold border-bottom pb-1 mb-1">PERMANENT RESIDENCE:</span>
                        <div id="previewPermanent" class="text-dark text-wrap">--</div>
                    </div>
                </div>
                
                <button type="button" id="btnReset" class="btn btn-outline-secondary w-100 fw-bold">Wipe System States & Restart</button>
            </div>

        </div>
    </div>
</div>

</body>
</html>
